        if (card.sound.includes("sea")) return "sea";
      }
      return "land"; // fallback if not recognized
    }
    // Determines which type has advantage: air > sea, sea > land, land > air.
    function isStrong(type1, type2) {
      if (type1 === "air" && type2 === "sea") return true;
      if (type1 === "sea" && type2 === "land") return true;
      if (type1 === "land" && type2 === "air") return true;
      return false;
    }
    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      let words = text.split(' ');
      let line = "";
      let lines = [];
      for (let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + " ";
        let metrics = ctx.measureText(testLine);
        if (metrics.width > maxWidth && n > 0) {
          lines.push(line);
          line = words[n] + " ";
        } else {
          line = testLine;
        }
      }
      lines.push(line);
      for (let i = 0; i < lines.length; i++) {
        ctx.fillText(lines[i], x, y + i * lineHeight);
      }
      return lines.length;
    }

            let rand = Math.floor(Math.random()*5)+1;
            soundFile = `russian${rand}.mp3`;
          }
        } else {
          soundFile = "ground.mp3";
        }
      }
      else {
        // Nazi Germany by default.
        if (faction === "enemy") {
          if (enemyFaction === "Great Britain") {
            let rand = Math.floor(Math.random()*5)+1;
            soundFile = `british${rand}.mp3`;
          } else if (enemyFaction === "Fascist Italy") {
            let rand = Math.floor(Math.random()*5)+1;
            soundFile = `italian${rand}.mp3`;
          } else {
            let rand = Math.floor(Math.random()*5)+1;
            soundFile = `russian${rand}.mp3`;
          }
        } else if (faction === "player") {
          let rand = Math.floor(Math.random()*5)+1;
          soundFile = `german${rand}.mp3`;
        } else {
          soundFile = "ground.mp3";
        }
      }
      let sound = new Audio(soundFile);
      sound.play();
      sound.onended = callback;
    }

    // =============== Main Game Screen Drawing Functions ===============
    function drawStaticMainGame() {
      ctx.drawImage(mainScreenImg, 0, 0, canvas.width, canvas.height);
      const rectHeight = canvas.height/5;
      ctx.drawImage(buttonImg, 0, 0, canvas.width, rectHeight);
      ctx.drawImage(buttonImg, 0, canvas.height - rectHeight, canvas.width, rectHeight);
      ctx.fillStyle = "white";
      ctx.font = fontLoaded ? "24px Wolfenstein" : "24px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Pupper Power", canvas.width - 240, rectHeight/2 - 30);
      ctx.drawImage(pupperpowerImg, canvas.width - 260, rectHeight/2, 40, 40);
      ctx.fillText("= " + enemyPupperPower, canvas.width - 240, rectHeight/2 + 50);
      ctx.fillText("Pupper Power", canvas.width - 240, canvas.height - rectHeight/2 - 30);
      ctx.drawImage(pupperpowerImg, canvas.width - 260, canvas.height - rectHeight/2, 40, 40);
      ctx.fillText("= " + playerPupperPower, canvas.width - 240, canvas.height - rectHeight/2 + 50);

      const cardMargin = 20;
      const cardZoneHeight = rectHeight - 2 * cardMargin;
      const naturalW = cardbackImg.naturalWidth, naturalH = cardbackImg.naturalHeight;
      const scaleFactor = cardZoneHeight / naturalH;
      const scaledWidth = naturalW * scaleFactor;
      const bottomCardZoneX = canvas.width - scaledWidth - cardMargin;
      const bottomCardZoneY = canvas.height - rectHeight + cardMargin;
      ctx.drawImage(cardbackImg, bottomCardZoneX, bottomCardZoneY, scaledWidth, cardZoneHeight);
      const topCardZoneX = canvas.width - scaledWidth - cardMargin;
      const topCardZoneY = cardMargin;
      ctx.drawImage(cardbackImg, topCardZoneX, topCardZoneY, scaledWidth, cardZoneHeight);

      const middleY = rectHeight, middleHeight = canvas.height - 2 * rectHeight;
      const laneWidth = canvas.width * 0.15, laneSpacing = canvas.width * 0.02;
      const totalLanesWidth = 3 * laneWidth + 2 * laneSpacing;
      const laneStartX = (canvas.width - totalLanesWidth) / 2;
      for (let i = 0; i < 3; i++){
        let laneX = laneStartX + i*(laneWidth + laneSpacing);
        ctx.drawImage(battlefieldImg, laneX, middleY, laneWidth, middleHeight);
        let laneCenterY = middleY + middleHeight/2;
        const wireHeight = 100;
        ctx.drawImage(wireImg, laneX, laneCenterY - wireHeight/2, laneWidth, wireHeight);
      }
      drawHandCards();
      drawEnemyHandCards();
      drawLaneCards();
      drawLaneAttackTexts();
      if (gamePhase === "playerTurnComplete") { drawRightButton("end turn"); }
      if (gamePhase === "enemyTurnComplete") { drawRightButton("battle!"); }
      drawGeneralCards();
    }

    // =============== Animations and Battle Resolution Functions ===============
    function initCardAnimations() {
      const rectHeight = canvas.height/5, cardMargin = 20;
      const cardZoneHeight = rectHeight - 2 * cardMargin;
      let animations = [], gap = 20, numCards = 3;
      let totalTargetWidth = 0, targetSizes = [], selectedCards = [];
      for (let i = 0; i < numCards; i++){
        let card = getRandomCard(playerCardPool);
        card.faceDown = false;
        selectedCards.push(card);
        let tHeight = cardZoneHeight;
        let tWidth = card.img.naturalWidth * (tHeight / card.img.naturalHeight);
        targetSizes.push({ width: tWidth, height: tHeight });
        totalTargetWidth += tWidth;
      }
      totalTargetWidth += gap * (numCards - 1);
      const targetStartX = (canvas.width - totalTargetWidth) / 2, targetY = canvas.height - rectHeight/2;
      let currentX = targetStartX;
      selectedCards.forEach((card, index) => {
        animations.push({
          img: card.img,
          startX: canvas.width - (cardbackImg.naturalWidth * (cardZoneHeight / cardbackImg.naturalHeight)) - 20,
          startY: canvas.height - rectHeight + 20,
          targetX: currentX,
          targetY: targetY - targetSizes[index].height/2,
          currentX: canvas.width - (cardbackImg.naturalWidth * (cardZoneHeight / cardbackImg.naturalHeight)) - 20,
          currentY: canvas.height - rectHeight + 20,
          width: targetSizes[index].width,
          height: targetSizes[index].height,
          attack: card.attack,
          cost: card.cost,
          sound: card.sound,
          faction: card.faction,
          faceDown: card.faceDown
        });
        currentX += targetSizes[index].width + gap;
      });
      cardAnimations = animations;
      handCards = [];
    }

    function initEnemyCardAnimations() {
      const rectHeight = canvas.height/5, cardMargin = 20;
      const cardZoneHeight = rectHeight - 2 * cardMargin;
      let animations = [], gap = 20, numCards = 3;
      let totalTargetWidth = 0, targetSizes = [], selectedCards = [];
      for (let i = 0; i < numCards; i++){
        let card = getRandomCard(enemyCardPool);
        card.faceDown = true;
        selectedCards.push(card);
        let tHeight = cardZoneHeight;
        let tWidth = card.img.naturalWidth * (tHeight / card.img.naturalHeight);
        targetSizes.push({ width: tWidth, height: tHeight });
        totalTargetWidth += tWidth;
      }
      totalTargetWidth += gap * (numCards - 1);
      const targetStartX = (canvas.width - totalTargetWidth) / 2, targetY = rectHeight/2;
      let currentX = targetStartX;
      selectedCards.forEach((card, index) => {
        animations.push({
          img: card.img,
          startX: canvas.width - (cardbackImg.naturalWidth * (cardZoneHeight / cardbackImg.naturalHeight)) - 20,
          startY: 20,
          targetX: currentX,
          targetY: targetY - targetSizes[index].height/2,
          currentX: canvas.width - (cardbackImg.naturalWidth * (cardZoneHeight / cardbackImg.naturalHeight)) - 20,
          currentY: 20,
          width: targetSizes[index].width,
          height: targetSizes[index].height,
          attack: card.attack,
          cost: card.cost,
          sound: card.sound,
          faction: card.faction,
          faceDown: true
        });
        currentX += targetSizes[index].width + gap;
      });
      enemyCardAnimations = animations;

    }

    function autoDragEnemyCard(card, targetLane, callback) {
      const rectHeight = canvas.height/5;
      const middleY = rectHeight, middleHeight = canvas.height - 2 * rectHeight;
      const laneWidth = canvas.width * 0.15, laneSpacing = canvas.width * 0.02;
      const totalLanesWidth = 3 * laneWidth + 2 * laneSpacing;
      const laneStartX = (canvas.width - totalLanesWidth) / 2;
      let targetX = laneStartX + targetLane * (laneWidth + laneSpacing) + laneWidth/2 - card.width/2;
      let targetY = middleY + middleHeight/4 - card.height/2;
      const startX = card.currentX, startY = card.currentY;
      const duration = enemyDragDuration;
      let startTime = null;
      function animate(time) {
        if (!startTime) startTime = time;
        let progress = (time - startTime) / duration;
        progress = Math.min(progress, 1);
        card.currentX = startX + (targetX - startX) * progress;
        card.currentY = startY + (targetY - startY) * progress;
        drawStaticMainGame();
        ctx.drawImage(cardbackImg, card.currentX, card.currentY, card.width, card.height);
        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          enemyPupperPower -= card.cost;
          enemyLaneAssignments[targetLane] = card;
          card.laneX = card.currentX;
          card.laneY = card.currentY;
          card.faceDown = true;
          callback();
        }
      }
      requestAnimationFrame(animate);
    }

    function processEnemyCardsSequentially() {
      enemyLanePlayIndex = 0;
      let i = 0;
      function processNext() {
        if (i >= enemyHandCards.length) {
          gamePhase = "enemyTurnComplete";
          setTimeout(() => { requestAnimationFrame(animateTurn); }, 500);
          return;
        }
        let card = enemyHandCards[i];
        if (enemyLanePlayIndex < 3 && enemyPupperPower >= card.cost) {
          autoDragEnemyCard(card, enemyLanePlayIndex, function() {
            enemyLanePlayIndex++;
            i++;
            processNext();
          });
        } else {
          i++;
          processNext();
        }
      }
      processNext();
    }

    function flipLaneCards(callback) {
      const duration = 600;
      let startTime = null;
      function animate(time) {
        if (!startTime) startTime = time;
        let progress = (time - startTime) / duration;
        progress = Math.min(progress, 1);
        drawStaticMainGame();
        for (let i = 0; i < 3; i++){
          if (playerLaneAssignments[i]) {
            let card = playerLaneAssignments[i];
            let scale = Math.abs(Math.cos(progress * Math.PI));
            let cardImg = (progress >= 0.5) ? card.img : cardbackImg;
            ctx.save();
            ctx.translate(card.laneX + card.width/2, card.laneY + card.height/2);
            ctx.scale(scale, 1);
            ctx.drawImage(cardImg, -card.width/2, -card.height/2, card.width, card.height);
            ctx.restore();
          }
          if (enemyLaneAssignments[i]) {
            let card = enemyLaneAssignments[i];
            let scale = Math.abs(Math.cos(progress * Math.PI));
            let cardImg = (progress >= 0.5) ? card.img : cardbackImg;
            ctx.save();
            ctx.translate(card.laneX + card.width/2, card.laneY + card.height/2);
            ctx.scale(scale, 1);
            ctx.drawImage(cardImg, -card.width/2, -card.height/2, card.width, card.height);
            ctx.restore();
          }
        }
        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          for (let i = 0; i < 3; i++){
            if (playerLaneAssignments[i]) playerLaneAssignments[i].faceDown = false;
            if (enemyLaneAssignments[i]) enemyLaneAssignments[i].faceDown = false;
          }
          callback();
        }
      }
      requestAnimationFrame(animate);
    }

    function animateSingleAttackAndReturn(card, callback) {
      card.isAnimatingAttack = true;
      const rectHeight = canvas.height/5;
      const middleHeight = canvas.height - 2 * rectHeight;
      let targetY;
      if (card.faction === "enemy") {
        targetY = rectHeight + (3 * middleHeight / 4) - card.height/2;
      } else {
        targetY = rectHeight + (middleHeight / 4) - card.height/2;
      }
      const targetX = card.laneX;
      const startX = card.currentX, startY = card.currentY;
      const duration = 500;
      let startTime = null;
      function animateAttack(time) {
        if (!startTime) startTime = time;
        let progress = (time - startTime) / duration;
        progress = Math.min(progress, 1);
        card.currentX = startX + (targetX - startX) * progress;
        card.currentY = startY + (targetY - startY) * progress;
        drawStaticMainGame();
        let img = card.faceDown ? cardbackImg : card.img;
        ctx.drawImage(img, card.currentX, card.currentY, card.width, card.height);
        if (progress < 1) {
          requestAnimationFrame(animateAttack);
        } else {
          let attackSound = new Audio(card.sound || "ground.mp3");
          attackSound.play();
          if (card.faction === "enemy") {
            playerGeneralLife -= card.attack;
            if (playerGeneralLife < 0) playerGeneralLife = 0;
          } else {
            enemyGeneralLife -= card.attack;
            if (enemyGeneralLife < 0) enemyGeneralLife = 0;
          }
          animateExplosionNoHide(card, function() {
            if (card.faction === "enemy") {
              for (let i = 0; i < 3; i++){
                if (playerLaneAssignments[i] === card.loser) { playerLaneAssignments[i] = null; }
              }
            } else {
              for (let i = 0; i < 3; i++){
                if (enemyLaneAssignments[i] === card.loser) { enemyLaneAssignments[i] = null; }
              }
            }
            animateReturn(card, callback);
          });
        }
      }
      requestAnimationFrame(animateAttack);
    }

    function animateExplosionNoHide(card, callback) {
      const explosionSound = new Audio("explosion.mp3");
      explosionSound.play();
      const explosionOverlay = document.createElement("img");
      explosionOverlay.src = "explosion.gif";
      explosionOverlay.style.position = "absolute";
      explosionOverlay.style.zIndex = "9999";
      explosionOverlay.style.left = (canvas.offsetLeft + card.currentX) + "px";
      explosionOverlay.style.top = (canvas.offsetTop + card.currentY) + "px";
      explosionOverlay.style.width = card.width + "px";
      explosionOverlay.style.height = card.height + "px";
      explosionOverlay.style.pointerEvents = "none";
      document.body.appendChild(explosionOverlay);
      setTimeout(() => {
        if (explosionOverlay.parentNode) {
          explosionOverlay.parentNode.removeChild(explosionOverlay);
        }
        card.hidden = true;
        callback();
      }, 600);
    }

    function animateStrike(winner, loser, callback) {
      winner.isAnimatingAttack = true;
      const startX = winner.currentX, startY = winner.currentY;
      const targetX = loser.currentX, targetY = loser.currentY;
      const duration = 500;
      let startTime = null;
      function animate(time) {
        if (!startTime) startTime = time;
        let progress = (time - startTime) / duration;
        progress = Math.min(progress, 1);
        winner.currentX = startX + (targetX - startX) * progress;
        winner.currentY = startY + (targetY - startY) * progress;
        drawStaticMainGame();
        let img = winner.faceDown ? cardbackImg : winner.img;
        ctx.drawImage(img, winner.currentX, winner.currentY, winner.width, winner.height);
        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          callback();
        }
      }
      requestAnimationFrame(animate);
    }

    function animateReturn(card, callback) {
      const startX = card.currentX, startY = card.currentY;
      const targetX = (card.laneX !== undefined) ? card.laneX : card.targetX;
      const targetY = (card.laneY !== undefined) ? card.laneY : card.targetY;
      const duration = 500;
      let startTime = null;
      function animate(time) {
        if (!startTime) startTime = time;
        let progress = (time - startTime) / duration;
        progress = Math.min(progress, 1);
        card.currentX = startX + (targetX - startX) * progress;
        card.currentY = startY + (targetY - startY) * progress;
        drawStaticMainGame();
        let img = card.faceDown ? cardbackImg : card.img;
        ctx.drawImage(img, card.currentX, card.currentY, card.width, card.height);
        if (progress < 1)
          requestAnimationFrame(animate);
        else {
          card.isAnimatingAttack = false;
          callback();
        }
      }
      requestAnimationFrame(animate);
    }

    function animateEqualAttack(card1, card2, callback) {
      card1.isAnimatingAttack = true;
      card2.isAnimatingAttack = true;
      let midX = (card1.currentX + card2.currentX) / 2;
      let midY = (card1.currentY + card2.currentY) / 2;
      const duration = 500;
      let startTime = null;
      const start1 = { x: card1.currentX, y: card1.currentY };
      const start2 = { x: card2.currentX, y: card2.currentY };
      function animate(time) {
        if (!startTime) startTime = time;
        let progress = (time - startTime) / duration;
        progress = Math.min(progress, 1);
        card1.currentX = start1.x + (midX - start1.x) * progress;
        card1.currentY = start1.y + (midY - start1.y) * progress;
        card2.currentX = start2.x + (midX - start2.x) * progress;
        card2.currentY = start2.y + (midY - start2.y) * progress;
        drawStaticMainGame();
        let img1 = card1.faceDown ? cardbackImg : card1.img;
        let img2 = card2.faceDown ? cardbackImg : card2.img;
        ctx.drawImage(img1, card1.currentX, card1.currentY, card1.width, card1.height);
        ctx.drawImage(img2, card2.currentX, card2.currentY, card2.width, card2.height);
        if (progress < 1) {
          requestAnimationFrame(animate);
        } else {
          let explosionSound = new Audio("explosion.mp3");
          explosionSound.play();
          const explosionOverlay = document.createElement("img");
          explosionOverlay.src = "explosion.gif";
          explosionOverlay.style.position = "absolute";
          explosionOverlay.style.zIndex = "9999";
          let explosionWidth = Math.max(card1.width, card2.width);
          let explosionHeight = Math.max(card1.height, card2.height);
          explosionOverlay.style.left = (canvas.offsetLeft + midX - explosionWidth/2) + "px";
          explosionOverlay.style.top = (canvas.offsetTop + midY - explosionHeight/2) + "px";
          explosionOverlay.style.width = explosionWidth + "px";
          explosionOverlay.style.height = explosionHeight + "px";
          explosionOverlay.style.pointerEvents = "none";
          document.body.appendChild(explosionOverlay);
          setTimeout(() => {
            if (explosionOverlay.parentNode) {
              explosionOverlay.parentNode.removeChild(explosionOverlay);
            }
            card1.hidden = true;
            card2.hidden = true;
            callback();
          }, 600);
        }
      }
      requestAnimationFrame(animate);
    }

    function displayBattlePopup(text, callback) {
      const popupW = 200, popupH = 60;
      const popupX = canvas.width/2 - popupW/2;
      const popupY = canvas.height/2 - popupH/2;
      ctx.drawImage(buttonImg, popupX, popupY, popupW, popupH);
      ctx.fillStyle = "black";
      ctx.font = fontLoaded ? "24px Wolfenstein" : "24px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, popupX + popupW/2, popupY + popupH/2);
      setTimeout(callback, 1000);
    }

    function processBattle() {
      currentBattleLane = 0;
      processNextLane();
    }
    function processNextLane() {
      if (currentBattleLane >= 3) {
        setTimeout(newRound, 1000);
        return;
      }
      displayBattlePopup("lane " + (currentBattleLane + 1), () => {
        resolveLane(currentBattleLane, () => {
          currentBattleLane++;
          setTimeout(processNextLane, 1000);
        });
      });
    }
    function resolveLane(laneIndex, callback) {
      let playerCard = playerLaneAssignments[laneIndex] || null;
      let enemyCard = enemyLaneAssignments[laneIndex] || null;
      if (!playerCard && !enemyCard) {
        displayBattlePopup("no cards in lane " + (laneIndex + 1), callback);
        return;
      }
      if (playerCard && !enemyCard) {
        displayBattlePopup("Player wins lane " + (laneIndex + 1), () => {
          animateSingleAttackAndReturn(playerCard, () => {
            playerLaneAssignments[laneIndex] = null;
            callback();
          });
        });
        return;
      }
      if (!playerCard && enemyCard) {
        displayBattlePopup("Enemy wins lane " + (laneIndex + 1), () => {
          animateSingleAttackAndReturn(enemyCard, () => {
            enemyLaneAssignments[laneIndex] = null;
            callback();
          });
        });
        return;
      }
      let playerType = getCardType(playerCard);
      let enemyType = getCardType(enemyCard);
      let playerEffectiveAttack = playerCard.attack, enemyEffectiveAttack = enemyCard.attack;
      let bonusApplied = false, bonusText = "";
      if (isStrong(playerType, enemyType)) {
        playerEffectiveAttack *= 2;
        bonusText = "Strong vs Weak! Bonus: +" + playerCard.attack;
        bonusApplied = true;
        playerCard.attack = playerEffectiveAttack;
      } else if (isStrong(enemyType, playerType)) {
        enemyEffectiveAttack *= 2;
        bonusText = "Strong vs Weak! Bonus: +" + enemyCard.attack;
        bonusApplied = true;
        enemyCard.attack = enemyEffectiveAttack;
      }
      if (bonusApplied) {
        displayBattlePopup(bonusText, function() {
          continueLaneResolution();
        });
      } else {
        continueLaneResolution();
      }
      function continueLaneResolution() {
        if (playerEffectiveAttack === enemyEffectiveAttack) {
          displayBattlePopup("Equal power in lane " + (laneIndex + 1), function() {
            animateEqualAttack(playerCard, enemyCard, function() {
              playerLaneAssignments[laneIndex] = null;
              enemyLaneAssignments[laneIndex] = null;
              callback();
            });
          });
          return;
        }
        let winner = null, loser = null, winnerSide = "", damage = 0;
        if (playerEffectiveAttack > enemyEffectiveAttack) {
          winner = playerCard;
          loser = enemyCard;
          winnerSide = "Player";
          damage = Math.max(playerEffectiveAttack - enemyCard.attack, 0);
        } else {
          winner = enemyCard;
          loser = playerCard;
          winnerSide = "Enemy";
          damage = Math.max(enemyEffectiveAttack - playerCard.attack, 0);
        }
        if (winnerSide === "Player") {
          enemyGeneralLife -= damage;
          if (enemyGeneralLife < 0) enemyGeneralLife = 0;
        } else {
          playerGeneralLife -= damage;
          if (playerGeneralLife < 0) playerGeneralLife = 0;
        }
        playWinnerSound(winner, function(){});
        animateStrike(winner, loser, function() {
          animateExplosion(loser, function() {
            if (loser.faction === "enemy") {
              enemyLaneAssignments[laneIndex] = null;
            } else {
              playerLaneAssignments[laneIndex] = null;
            }
            displayBattlePopup(winnerSide + " wins lane " + (laneIndex + 1), function() {
              animateReturn(winner, callback);
            });
          });
        });
      }
    }

    function playWinnerSound(winner, callback) {
      if (winner.sound) {
        let sound = new Audio(winner.sound);
        sound.play();
        sound.onended = callback;
        return;
      }
      let sound = null;
      if (winner.img.src.includes("soviet_heavy_tank") || winner.img.src.includes("soviet_soldier"))
        sound = new Audio("ground.mp3");
      else if (winner.img.src.includes("soviet_submarine") || winner.img.src.includes("typhoon_submarine"))
        sound = new Audio("sea.mp3");
      else if (winner.img.src.includes("yak_fighter") || winner.img.src.includes("yermolayev_bomber"))
        sound = new Audio("air.mp3");
      else if (winner.img.src.includes("bullet_hound") || winner.img.src.includes("ss_silver_snout"))
        sound = new Audio("ground.mp3");
      else if (winner.img.src.includes("galefang_fighter") || winner.img.src.includes("nimbus_crawler"))
        sound = new Audio("air.mp3");
      else if (winner.img.src.includes("horizon_howler") || winner.img.src.includes("waveborn_warhound"))
        sound = new Audio("sea.mp3");
      if (sound) {
        sound.play();
        sound.onended = function() { callback(); };
      } else {
        callback();
      }
    }

    function animateExplosion(card, callback) {
      const explosionSound = new Audio("explosion.mp3");
      explosionSound.play();
      const explosionOverlay = document.createElement("img");
      explosionOverlay.src = "explosion.gif";
      explosionOverlay.style.position = "absolute";
      explosionOverlay.style.zIndex = "9999";
      explosionOverlay.style.left = (canvas.offsetLeft + card.currentX) + "px";
      explosionOverlay.style.top = (canvas.offsetTop + card.currentY) + "px";
      explosionOverlay.style.width = card.width + "px";
      explosionOverlay.style.height = card.height + "px";
      explosionOverlay.style.pointerEvents = "none";
      document.body.appendChild(explosionOverlay);
      setTimeout(() => {
        if (explosionOverlay.parentNode) {
          explosionOverlay.parentNode.removeChild(explosionOverlay);
        }
        card.hidden = true;
        callback();
      }, 600);
    }

    function newRound() {
      roundNumber++;
      playerPupperPower = Math.min(roundNumber, 6);
      enemyPupperPower = Math.min(roundNumber, 6);
      if (enemyGeneralLife <= 0) {
        displayBattlePopup("Player wins!", function() {});
        return;
      } else if (playerGeneralLife <= 0) {
        displayBattlePopup("Enemy wins!", function() {});
        return;
      }
      handCards = [];
      enemyHandCards = [];
      playerLaneAssignments = [null, null, null];
      enemyLaneAssignments = [null, null, null];
      gamePhase = "playerTurnOverlay";
      turnOverlayAlpha = 1;
      overlayFadeStart = null;
      currentCardIndex = 0;
      requestAnimationFrame(animateTurn);
    }

    // =============== Animate Turn Function ===============
    function animateTurn(timestamp) {
      drawStaticMainGame();
      if (gamePhase === "playerTurnOverlay") {
        if (!overlayFadeStart) overlayFadeStart = timestamp;
        let elapsed = timestamp - overlayFadeStart;
        turnOverlayAlpha = Math.max(1 - elapsed / overlayFadeDuration, 0);
        const overlayW = 300, overlayH = 80;
        const overlayX = canvas.width/2 - overlayW/2, overlayY = canvas.height/2 - overlayH/2;
        ctx.globalAlpha = turnOverlayAlpha;
        ctx.drawImage(buttonImg, overlayX, overlayY, overlayW, overlayH);
        ctx.fillStyle = "black";
        ctx.font = fontLoaded ? "36px Wolfenstein" : "36px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("player turn", overlayX + overlayW/2, overlayY + overlayH/2);
        ctx.globalAlpha = 1;
        if (elapsed < overlayFadeDuration) {
          requestAnimationFrame(animateTurn);
          return;
        } else {
          gamePhase = "playerDrawCards";
          initCardAnimations();
          cardAnimStartTime = null;
          requestAnimationFrame(animateTurn);
          return;
        }
      }
      if (gamePhase === "playerDrawCards") {
        drawStaticMainGame();
        drawHandCards();
        if (currentCardIndex < cardAnimations.length) {
          if (!cardAnimStartTime) { cardAnimStartTime = timestamp; flipSound.play(); }
          let progress = (timestamp - cardAnimStartTime) / cardAnimationDuration;
          progress = Math.min(progress, 1);
          let anim = cardAnimations[currentCardIndex];
          anim.currentX = anim.startX + (anim.targetX - anim.startX) * progress;
          anim.currentY = anim.startY + (anim.targetY - anim.startY) * progress;
          ctx.drawImage(anim.img, anim.currentX, anim.currentY, anim.width, anim.height);
          if (progress < 1) {
            requestAnimationFrame(animateTurn);
            return;
          } else {
            handCards.push(anim);
            currentCardIndex++;
            cardAnimStartTime = null;
            setTimeout(() => { requestAnimationFrame(animateTurn); }, cardDrawDelay);
            return;
          }
        } else {
          gamePhase = "playerTurnComplete";
          requestAnimationFrame(animateTurn);
          return;
        }
      }
      if (gamePhase === "enemyTurnOverlay") {
        if (!enemyOverlayFadeStart) enemyOverlayFadeStart = timestamp;
        let elapsed = timestamp - enemyOverlayFadeStart;
        enemyTurnOverlayAlpha = Math.max(1 - elapsed / overlayFadeDuration, 0);
        const overlayW = 300, overlayH = 80;
        const overlayX = canvas.width/2 - overlayW/2, overlayY = canvas.height/2 - overlayH/2;
        ctx.globalAlpha = enemyTurnOverlayAlpha;
        ctx.drawImage(buttonImg, overlayX, overlayY, overlayW, overlayH);
        ctx.fillStyle = "black";
        ctx.font = fontLoaded ? "36px Wolfenstein" : "36px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Enemy turn", overlayX + overlayW/2, overlayY + overlayH/2);
        ctx.globalAlpha = 1;
        if (elapsed < overlayFadeDuration) {
          requestAnimationFrame(animateTurn);
          return;
        } else {
          gamePhase = "enemyDrawCards";
          initEnemyCardAnimations();
          enemyCardAnimStartTime = null;
          requestAnimationFrame(animateTurn);
          return;
        }
      }
      if (gamePhase === "enemyDrawCards") {
        drawStaticMainGame();
        drawEnemyHandCards();
        if (currentEnemyCardIndex < enemyCardAnimations.length) {
          if (!enemyCardAnimStartTime) { enemyCardAnimStartTime = timestamp; flipSound.play(); }
          let progress = (timestamp - enemyCardAnimStartTime) / cardAnimationDuration;
          progress = Math.min(progress, 1);
          let anim = enemyCardAnimations[currentEnemyCardIndex];
          anim.currentX = anim.startX + (anim.targetX - anim.startX) * progress;
          anim.currentY = anim.startY + (anim.targetY - anim.startY) * progress;
          ctx.drawImage(cardbackImg, anim.currentX, anim.currentY, anim.width, anim.height);
          if (progress < 1) {
            requestAnimationFrame(animateTurn);
            return;
          } else {
            enemyHandCards.push(anim);
            currentEnemyCardIndex++;
            enemyCardAnimStartTime = null;
            setTimeout(() => { requestAnimationFrame(animateTurn); }, cardDrawDelay);
            return;
          }
        } else {
          gamePhase = "enemyDrag";
          processEnemyCardsSequentially();
          return;
        }
      }
    }

    // =============== Event Listeners (Mouse Events) ===============
    canvas.addEventListener("mousedown", function(event) {
      const rect = canvas.getBoundingClientRect();
      const mouseX = event.clientX - rect.left, mouseY = event.clientY - rect.top;
      if (currentScreen === "menu") {
        const btnW = 400, btnH = 100;
        const startBtn = { x: canvas.width/2 - btnW/2, y: canvas.height*0.5, width: btnW, height: btnH };
        const exitBtn = { x: canvas.width/2 - btnW/2, y: canvas.height*0.7, width: btnW, height: btnH };
        if (mouseX >= startBtn.x && mouseX <= startBtn.x+btnW &&
            mouseY >= startBtn.y && mouseY <= startBtn.y+btnH) {
          currentScreen = "factionChoice";
          startMusic();
          draw();
        } else if (mouseX >= exitBtn.x && mouseX <= exitBtn.x+btnW &&
                   mouseY >= exitBtn.y && mouseY <= exitBtn.y+btnH) {
          // exit logic if desired
        }
      } else if (currentScreen === "factionChoice") {
        for (let opt of factionOptions) {
          let btn = opt.buttonRect;
          if (!btn) continue;
          if (mouseX >= btn.x && mouseX <= btn.x+btn.width &&
              mouseY >= btn.y && mouseY <= btn.y+btn.height) {
            if (opt.valid) {
              playerFaction = opt.name;
              enemyFaction = pickEnemyFaction(playerFaction);
              snifflerImg = getGeneralForFaction(playerFaction);
              pawlinImg = getGeneralForFaction(enemyFaction);
              let pPool = getPoolForFaction(playerFaction);
              playerCardPool = pPool.slice();
              let ePool = getPoolForFaction(enemyFaction);
              enemyCardPool = ePool.map(c => Object.assign({}, c, { faction: "enemy" }));
              currentScreen = "main";
              gamePhase = "playerTurnOverlay";
              turnOverlayAlpha = 1;
              overlayFadeStart = null;
              currentCardIndex = 0;
              handCards = [];
              requestAnimationFrame(animateTurn);
            } else {
              alert("Faction not implemented yet. Please choose a valid faction.");
            }
            return;
          }
        }
      } else if (currentScreen === "main") {
        const btnX = getRightButtonX(), btnY = getRightButtonY();
        if (mouseX >= btnX && mouseX <= btnX+rightButtonWidth &&
            mouseY >= btnY && mouseY <= btnY+rightButtonHeight) {
          if (gamePhase === "playerTurnComplete") {
            playTurnEndSound("player", function() {
              gamePhase = "enemyTurnOverlay";
              enemyTurnOverlayAlpha = 1;
              enemyOverlayFadeStart = null;
              currentEnemyCardIndex = 0;
              enemyCardAnimations = [];
              enemyCardAnimStartTime = null;
              enemyHandCards = [];
              requestAnimationFrame(animateTurn);
            });
            return;
          } else if (gamePhase === "enemyTurnComplete") {
            playTurnEndSound("enemy", function() {
              gamePhase = "battlePhase";
              flipLaneCards(function() { processBattle(); });
            });
            return;
          }
        }
        if (gamePhase === "playerTurnComplete") {
          for (let card of handCards) {
            if (mouseX >= card.currentX && mouseX <= card.currentX+card.width &&
                mouseY >= card.currentY && mouseY <= card.currentY+card.height) {
              playClickSound();
              draggingCard = card;
              dragOffsetX = mouseX - card.currentX;
              dragOffsetY = mouseY - card.currentY;
              break;
            }
          }
        }
      }
    });

    canvas.addEventListener("mousemove", function(event) {
      if (currentScreen === "main" && gamePhase === "playerTurnComplete" && draggingCard) {
        const rect = canvas.getBoundingClientRect();
        const mouseX = event.clientX - rect.left, mouseY = event.clientY - rect.top;
        draggingCard.currentX = mouseX - dragOffsetX;
        draggingCard.currentY = mouseY - dragOffsetY;
        drawStaticMainGame();
      }
    });

    canvas.addEventListener("mouseup", function(event) {
      if (currentScreen === "main" && gamePhase === "playerTurnComplete" && draggingCard) {
        const rectHeight = canvas.height/5, middleY = rectHeight, middleHeight = canvas.height - 2*rectHeight;
        const dropZoneY = middleY + middleHeight/2;
        const cardCenterX = draggingCard.currentX + draggingCard.width/2;
        const cardCenterY = draggingCard.currentY + draggingCard.height/2;
        if (cardCenterY > dropZoneY) {
          const laneWidth = canvas.width * 0.15, laneSpacing = canvas.width * 0.02;
          const totalLanesWidth = 3 * laneWidth + 2 * laneSpacing;
          const laneStartX = (canvas.width - totalLanesWidth) / 2;
          for (let i = 0; i < 3; i++) {
            let laneX = laneStartX + i*(laneWidth+laneSpacing);
            if (cardCenterX >= laneX && cardCenterX <= laneX + laneWidth) {
              const dropX = laneX + laneWidth/2 - draggingCard.width/2;
              const dropY = middleY + (3*middleHeight/4) - draggingCard.height/2;
              if (playerPupperPower >= draggingCard.cost) {
                playerPupperPower -= draggingCard.cost;
                draggingCard.currentX = dropX;
                draggingCard.currentY = dropY;
                draggingCard.laneX = dropX;
                draggingCard.laneY = dropY;
                draggingCard.faceDown = true;
                playerLaneAssignments[i] = draggingCard;
                playClickSound();
              } else {
                animateReturn(draggingCard, function() {});
              }
              break;
            }
          }
        }
        draggingCard = null;
        drawStaticMainGame();
      }
    });

    function getRightButtonX() {
      const rectHeight = canvas.height/5, middleY = rectHeight, middleHeight = canvas.height - 2 * rectHeight;
      const laneWidth = canvas.width * 0.15, laneSpacing = canvas.width * 0.02;
      const totalLanesWidth = 3 * laneWidth + 2 * laneSpacing;
      const laneStartX = (canvas.width - totalLanesWidth) / 2;
      return laneStartX + totalLanesWidth + 20;
    }
    function getRightButtonY() {
      const rectHeight = canvas.height/5, middleY = rectHeight, middleHeight = canvas.height - 2 * rectHeight;
      return middleY + middleHeight/2 - rightButtonHeight/2;
    }

    // =============== End of Event Listeners ===============
    // (All game logic is now included above.)
  </script>
</body>
</html>
